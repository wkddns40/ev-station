[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=charger_api --cov-report=term-missing --cov-fail-under=70 -q"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]
